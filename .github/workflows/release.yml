name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Generate debug keystore (test signing)
        run: |
          keytool -genkey -v \
            -keystore ./booming_keystore.jks \
            -alias booming \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=BoomingMusic, O=Test, C=US"
          cat > ./keystore.properties <<EOF
          storeFile=./booming_keystore.jks
          storePassword=android
          keyAlias=booming
          keyPassword=android
          EOF

      - name: Build normal release APK
        run: ./gradlew assembleNormalRelease
        # LastFM keys are intentionally omitted – the build falls back to
        # empty strings and disables the integration at runtime.

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/normal/release/BoomingMusic-*.apk

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.inputs.version, 'alpha') &&
      !contains(github.event.inputs.version, 'beta') &&
      !contains(github.event.inputs.version, 'rc')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: release-apk
          merge-multiple: true

      - name: Set prerelease flag
        id: prerelease
        run: |
          TAG="${{ github.event.inputs.version }}"
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          prerelease: ${{ steps.prerelease.outputs.value }}
          generate_release_notes: true
          files: release-artifacts/BoomingMusic-*.apk
